<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANENUSA | Solusi Digital Pertanian</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; }
        
        /* Logika Halaman */
        .page { display: none; }
        .active-page { display: block; }
    </style>
</head>
<body>

    <!-- 1. LANDING PAGE -->
    <div id="landing-page" class="page active-page min-h-screen">
        <!-- Navbar -->
        <nav class="flex justify-between items-center px-20 py-8">
            <h1 class="text-2xl font-extrabold text-[#1F4E79]">PANENUSA</h1>
            <button onclick="showPage('login-page')" class="bg-[#1F4E79] text-white px-8 py-3 rounded-2xl font-bold shadow-lg shadow-blue-900/20 hover:bg-blue-900 transition">
                Masuk Sekarang
            </button>
        </nav>

        <!-- Hero -->
        <header class="text-center py-20 px-10">
            <h1 class="text-7xl font-extrabold text-slate-900 mb-6">Catat Panen, <span class="text-[#54A9CE]">Tingkatkan Profit.</span></h1>
            <p class="text-lg text-slate-500 mb-12 max-w-xl mx-auto">Sistem informasi digital untuk petani dan logistik dalam satu platform terintegrasi. Transparan, cepat, dan modern.</p>
        </header>
    </div>

    <!-- 2. LOGIN PAGE -->
    <div id="login-page" class="page min-h-screen flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-3xl border border-slate-100 shadow-2xl shadow-slate-200 w-full max-w-md">
            <h2 class="text-3xl font-extrabold text-slate-900 mb-2">Masuk ke Akun</h2>
            <p class="text-slate-500 mb-8">Selamat datang kembali, admin!</p>
            
            <div class="space-y-4">
                <input type="email" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-[#1F4E79] outline-none" placeholder="Email">
                <input type="password" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-[#1F4E79] outline-none" placeholder="Password">
                <button class="w-full bg-[#1F4E79] text-white py-4 rounded-2xl font-bold text-lg hover:bg-blue-900 transition">Masuk</button>
            </div>
            
            <button onclick="showPage('landing-page')" class="w-full mt-6 text-sm text-slate-400 font-semibold hover:text-[#1F4E79]">← Kembali ke Home</button>
        </div>
    </div>

    <script>
        function showPage(pageId) {
            // Sembunyikan semua page
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            // Tampilkan page yang dipilih
            document.getElementById(pageId).classList.add('active-page');
        }
    </script>
</body>
</html>
