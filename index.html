  <style>
    :root {
      --bg: #F8FAFC;               /* Slate 50 */
      --card: rgba(255, 255, 255, 0.95); 
      --ink: #0F172A;              /* Slate 900 */
      --ink-soft: #475569;         /* Slate 600 */
      --accent-gold: #F59E0B;      /* Amber 500 */
      --accent-lime: #10B981;      /* Emerald 500 */
      --forest-deep: #0B1224;      /* Dark Navy Base */
      --forest-base: #111C35;      /* Sidebar Navy */
      --forest-light: #162544;     /* Active Card Navy */
      --line: rgba(30, 64, 175, 0.1); 
      --topbar: #0B1224;           /* Topbar Navy */
    }

    body {
      background: var(--bg);
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: var(--ink);
    }

    @keyframes floatSlow {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }
    .orb-decor { animation: floatSlow 8s ease-in-out infinite; }
    .orb-decor-reverse { animation: floatSlow 7s ease-in-out infinite reverse; }

    .topbar { background: var(--topbar); color: #F8FAFC; }

    .btn-round {
      width: 52px; height: 52px; border-radius: 9999px;
      background: linear-gradient(135deg, var(--forest-deep) 0%, var(--forest-base) 100%);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .btn-round:hover { transform: scale(1.1) rotate(15deg); box-shadow: 0 6px 20px rgba(11, 18, 36, 0.3); }

    .pill {
      border-radius: 12px; padding: .85rem 1.6rem; 
      font-weight: 700; font-size: .8rem;
      display: inline-flex; align-items: center; gap: .6rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .hero-img { border-radius: 28px; overflow: hidden; background: var(--forest-deep); border: 1px solid var(--line); }
    .dot { width: 14px; height: 14px; border-radius: 9999px; }

    .stat-box { 
      background: linear-gradient(150deg, var(--forest-deep) 0%, #0B1224 100%); 
      border-radius: 28px;
      box-shadow: 0 12px 40px rgba(11, 18, 36, 0.15);
      border: 1px solid rgba(255,255,255,0.05);
    }

    .faq-item { border-bottom: 1px solid var(--line); transition: all 0.2s ease; }
    .faq-item:hover { border-color: var(--forest-base); }
    .faq-item summary { cursor: pointer; list-style: none; }
    .faq-item summary::-webkit-details-marker { display: none; }
    .faq-plus { transition: transform .25s ease; color: var(--accent-gold); }
    details[open] .faq-plus { transform: rotate(45deg); color: var(--forest-base); }

    .card-surface { 
      background: var(--card); 
      border: 1px solid var(--line); 
      backdrop-filter: blur(28px);
      box-shadow: 0 4px 20px rgba(11, 18, 36, 0.05);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .card-surface:hover {
      transform: translateY(-6px);
      border-color: var(--accent-gold);
      box-shadow: 0 12px 30px rgba(11, 18, 36, 0.1);
    }

    .bg-grid-pattern { 
      background-image: linear-gradient(rgba(30, 58, 138, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(30, 58, 138, 0.03) 1px, transparent 1px); 
      background-size: 40px 40px; 
    }

    ::selection { background: var(--forest-base); color: #fff; }
    :focus-visible { outline: 2px solid var(--forest-base); outline-offset: 3px; }
  </style>
</head>
